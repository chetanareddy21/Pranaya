<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.folderName}">Product Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 16px;
            background-color: #fcf8f2;
            padding: 40px;
            margin: 0;
        }
        .product-container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; gap: 30px; }
        .gallery-panel { flex: 1; }
        .details-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .main-image-container { width: 100%; height: 450px; overflow: hidden; border-radius: 6px; margin-bottom: 15px; border: 1px solid #eee; }
        .main-image-container img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-row {
            display: grid;
            grid-template-columns: repeat(5, 70px);
            gap: 10px;
            margin-top: 10px;
        }

        .thumbnail-row img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s ease;
        }

        .thumbnail-row img:hover {
            border-color: #800020;
        }

        /* Typography details mapping to requested styles */
        h1 { color: #222; margin: 0; font-size: 16px; font-weight: normal; }
        .product-code { color: #777; font-size: 12px; margin-left: 10px; }
        .description { color: #555; font-style: italic; font-size: 12px; }
        .price { color: #800020; font-size: 16px; font-weight: bold; margin: 10px 0; }
        .stock-warn { background-color: #fff3cd; color: #856404; padding: 8px 12px; border-radius: 4px; border: 1px solid #ffeeba; display: inline-block; font-weight: bold; }
        .meta-table { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; font-size: 12px; color: #555; }
        .meta-line { margin-bottom: 6px; }
        .meta-label { font-weight: bold; color: #333; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #800020; font-weight: bold; }
    </style>
</head>
<body>

<div style="max-width: 900px; margin: 0 auto;">
    <a class="back-btn" href="/">&larr; Back to Gallery</a>
</div>

<div class="product-container" th:if="${product != null}">

    <div class="gallery-panel">

        <div class="main-image-container">
            <img id="mainDisplay"
                 th:src="${product.coverImage}"
                 alt="Main View">
        </div>

        <div class="thumbnail-row">
            <img th:each="img : ${product.allImages}"
                 th:src="${img}"
                 onclick="changeMainImage(this)"
                 alt="Thumbnail">
        </div>

    </div>

    <div class="details-panel">
        <h1>
            <span th:text="${product.folderName}">Product Title</span>
            <span class="product-code" th:text="${product.productCode}">000000</span>
        </h1>

        <div class="description" th:text="${product.description}">Product description info goes here.</div>


        <div class="price" th:text="'₹' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}">₹0.00</div>

        <div class="stock-warn" th:if="${product.stock <= 3}">
            Hurry, <span th:text="${product.stock}">0</span> item(s) left in stock!
        </div>

        <div class="meta-table">
            <div class="meta-line">
                <span class="meta-label">Vendor:</span>
                <span th:text="${product.vendor}">Vendor Name</span>
            </div>
            <div class="meta-line">
                <span class="meta-label">Type:</span>
                <span th:text="${product.productType}">simple</span>
            </div>
            <div class="meta-line">
                <span class="meta-label">Available:</span>
                <span th:text="${product.stock} + ' Available'">1 Available</span>
            </div>
            <div class="price" th:text="'₹' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 2, 'POINT')}">₹0.00</div>

            <form th:action="@{/cart/add}" method="post" style="margin: 20px 0;">
                <input type="hidden" name="productName" th:value="${product.folderName}">

                <label style="font-weight:bold; margin-right: 10px;">Qty:</label>
                <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}"
                       style="width: 50px; padding: 6px; border-radius: 4px; border: 1px solid #ccc; text-align: center;">

                <button type="submit"
                        style="background-color: #800020; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-left: 10px;">
                    Add to Cart
                </button>
            </form>
        </div>
    </div>
</div>


<script>
    function changeMainImage(img){
        document.getElementById("mainDisplay").src = img.src;
    }
</script>

</body>
</html>
